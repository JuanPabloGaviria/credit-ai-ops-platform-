# Local development only. Do not deploy this compose file to production.
# Production secrets must come from a managed secret store (for example, Azure Key Vault).
services:
  postgres:
    image: postgres:16.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-credit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-credit}
      POSTGRES_DB: ${POSTGRES_DB:-credit_ai_ops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./services/identity/config/realm-export.json:/opt/keycloak/data/import/realm-export.json

volumes:
  postgres_data:
