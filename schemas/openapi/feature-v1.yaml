openapi: 3.1.0
info:
  title: feature API
  version: 1.0.0
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service health status
  /ready:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Service readiness status
  /metrics:
    get:
      summary: Metrics endpoint
      security: []
      responses:
        "200":
          description: Prometheus metrics payload
  /v1/features/status:
    get:
      summary: feature operational status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      responses:
        "200":
          description: Service-specific status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatusResponse'
        "400":
          $ref: '#/components/responses/InvalidRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
  /v1/features/materialize:
    post:
      summary: Materialize the canonical scoring feature vector from an application payload
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationInput'
      responses:
        "200":
          description: Materialized feature vector
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureVector'
              examples:
                materialized:
                  value:
                    application_id: app-000123
                    requested_amount: 15000
                    debt_to_income: 0.247059
                    amount_to_income: 1.764706
                    credit_history_months: 84
                    existing_defaults: 0
        "400":
          $ref: '#/components/responses/InvalidRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKeyOptional:
      in: header
      name: x-idempotency-key
      required: false
      schema:
        type: string
        minLength: 8
  responses:
    InvalidRequest:
      description: Invalid request payload or idempotency header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Token is valid but missing required audience or scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ServiceStatusResponse:
      type: object
      additionalProperties: false
      required: [service, status]
      properties:
        service:
          type: string
          const: feature
        status:
          type: string
          const: operational
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error_code, message, service, operation, trace_id, timestamp]
      properties:
        error_code:
          type: string
          minLength: 3
        message:
          type: string
          minLength: 1
        service:
          type: string
          minLength: 1
        operation:
          type: string
          minLength: 1
        trace_id:
          type: string
          minLength: 8
        cause:
          type:
            - string
            - "null"
        hint:
          type:
            - string
            - "null"
        timestamp:
          type: string
          format: date-time
    ApplicationInput:
      type: object
      additionalProperties: false
      required:
        - application_id
        - applicant_id
        - monthly_income
        - monthly_debt
        - requested_amount
        - credit_history_months
        - existing_defaults
      properties:
        application_id:
          type: string
          minLength: 8
        applicant_id:
          type: string
          minLength: 8
        monthly_income:
          type: number
          exclusiveMinimum: 0
        monthly_debt:
          type: number
          minimum: 0
        requested_amount:
          type: number
          exclusiveMinimum: 0
        credit_history_months:
          type: integer
          minimum: 0
        existing_defaults:
          type: integer
          minimum: 0
    FeatureVector:
      type: object
      additionalProperties: false
      required:
        - application_id
        - requested_amount
        - debt_to_income
        - amount_to_income
        - credit_history_months
        - existing_defaults
      properties:
        application_id:
          type: string
          minLength: 8
        requested_amount:
          type: number
          exclusiveMinimum: 0
        debt_to_income:
          type: number
          minimum: 0
        amount_to_income:
          type: number
          minimum: 0
        credit_history_months:
          type: integer
          minimum: 0
        existing_defaults:
          type: integer
          minimum: 0
