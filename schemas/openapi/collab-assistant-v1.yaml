openapi: 3.1.0
info:
  title: collab-assistant API
  version: 1.0.0
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service health status
  /ready:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Service readiness status
  /metrics:
    get:
      summary: Metrics endpoint
      security: []
      responses:
        "200":
          description: Prometheus metrics payload
  /v1/assistant/status:
    get:
      summary: collab-assistant operational status
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      responses:
        "200":
          description: Service-specific status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatusResponse'
        "400":
          $ref: '#/components/responses/InvalidRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
  /v1/assistant/summarize:
    post:
      summary: Generate the deterministic collaborator summary and persist it
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantSummaryRequest'
      responses:
        "200":
          description: Deterministic summary response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSummaryResponse'
        "400":
          $ref: '#/components/responses/InvalidRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
  /v1/assistant/summaries/{application_id}:
    get:
      summary: Retrieve the latest persisted assistant summary for an application
      parameters:
        - in: path
          name: application_id
          required: true
          schema:
            type: string
            minLength: 8
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      responses:
        "200":
          description: Persisted summary for the application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantSummaryResponse'
        "400":
          $ref: '#/components/responses/InvalidRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKeyOptional:
      in: header
      name: x-idempotency-key
      required: false
      schema:
        type: string
        minLength: 8
  responses:
    InvalidRequest:
      description: Invalid request payload or idempotency header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Token is valid but missing required audience or scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Summary was not found for the requested application
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ServiceStatusResponse:
      type: object
      additionalProperties: false
      required: [service, status]
      properties:
        service:
          type: string
          const: collab-assistant
        status:
          type: string
          const: operational
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error_code, message, service, operation, trace_id, timestamp]
      properties:
        error_code:
          type: string
          minLength: 3
        message:
          type: string
          minLength: 1
        service:
          type: string
          minLength: 1
        operation:
          type: string
          minLength: 1
        trace_id:
          type: string
          minLength: 8
        cause:
          type:
            - string
            - "null"
        hint:
          type:
            - string
            - "null"
        timestamp:
          type: string
          format: date-time
    AssistantSummaryRequest:
      type: object
      additionalProperties: false
      required: [application_id, decision, risk_score, reason_codes]
      properties:
        application_id:
          type: string
          minLength: 8
        decision:
          type: string
          pattern: "^(approve|review|decline)$"
        risk_score:
          type: number
          minimum: 0
          maximum: 1
        reason_codes:
          type: array
          items:
            type: string
    AssistantSummaryResponse:
      type: object
      additionalProperties: false
      required: [application_id, summary, mode]
      properties:
        application_id:
          type: string
          minLength: 8
        summary:
          type: string
          minLength: 1
        mode:
          type: string
          pattern: "^(deterministic|llm)$"
