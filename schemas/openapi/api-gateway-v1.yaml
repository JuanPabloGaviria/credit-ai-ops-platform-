openapi: 3.1.0
info:
  title: api-gateway API
  version: 1.0.0
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service health status
  /ready:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: Service readiness status
  /metrics:
    get:
      summary: Metrics endpoint
      security: []
      responses:
        "200":
          description: Prometheus metrics payload
  /v1/gateway/status:
    get:
      summary: api-gateway operational status
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyOptional'
      responses:
        "200":
          description: Service-specific status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatusResponse'
        "400":
          $ref: '#/components/responses/InvalidRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
  /v1/gateway/credit-evaluate:
    post:
      summary: Evaluate a credit application through the real feature, scoring, and decision services
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyRequired'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationInput'
            examples:
              application:
                value:
                  application_id: app-000123
                  applicant_id: applicant-0099
                  monthly_income: 8500
                  monthly_debt: 2100
                  requested_amount: 15000
                  credit_history_months: 84
                  existing_defaults: 0
      responses:
        "200":
          description: Synchronous gateway orchestration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayCreditEvaluationResponse'
        "400":
          $ref: '#/components/responses/InvalidRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "409":
          $ref: '#/components/responses/IdempotencyConflict'
        "500":
          $ref: '#/components/responses/InternalProcessingError'
        "502":
          $ref: '#/components/responses/UpstreamProviderInvalid'
        "503":
          $ref: '#/components/responses/UpstreamUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKeyOptional:
      in: header
      name: x-idempotency-key
      required: false
      schema:
        type: string
        minLength: 8
    IdempotencyKeyRequired:
      in: header
      name: x-idempotency-key
      required: true
      schema:
        type: string
        minLength: 8
  responses:
    InvalidRequest:
      description: Invalid request payload or idempotency header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Token is valid but missing required audience or scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    IdempotencyConflict:
      description: Duplicate request is already in progress or conflicts with stored payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalProcessingError:
      description: Gateway persisted a failure payload for replay
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpstreamProviderInvalid:
      description: Authorization or downstream provider returned an invalid payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpstreamUnavailable:
      description: Downstream dependency or authorization provider is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ServiceStatusResponse:
      type: object
      additionalProperties: false
      required: [service, status]
      properties:
        service:
          type: string
          const: api-gateway
        status:
          type: string
          const: operational
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error_code, message, service, operation, trace_id, timestamp]
      properties:
        error_code:
          type: string
          minLength: 3
        message:
          type: string
          minLength: 1
        service:
          type: string
          minLength: 1
        operation:
          type: string
          minLength: 1
        trace_id:
          type: string
          minLength: 8
        cause:
          type:
            - string
            - "null"
        hint:
          type:
            - string
            - "null"
        timestamp:
          type: string
          format: date-time
    ApplicationInput:
      type: object
      additionalProperties: false
      required:
        - application_id
        - applicant_id
        - monthly_income
        - monthly_debt
        - requested_amount
        - credit_history_months
        - existing_defaults
      properties:
        application_id:
          type: string
          minLength: 8
        applicant_id:
          type: string
          minLength: 8
        monthly_income:
          type: number
          exclusiveMinimum: 0
        monthly_debt:
          type: number
          minimum: 0
        requested_amount:
          type: number
          exclusiveMinimum: 0
        credit_history_months:
          type: integer
          minimum: 0
        existing_defaults:
          type: integer
          minimum: 0
    FeatureVector:
      type: object
      additionalProperties: false
      required:
        - application_id
        - requested_amount
        - debt_to_income
        - amount_to_income
        - credit_history_months
        - existing_defaults
      properties:
        application_id:
          type: string
          minLength: 8
        requested_amount:
          type: number
          exclusiveMinimum: 0
        debt_to_income:
          type: number
          minimum: 0
        amount_to_income:
          type: number
          minimum: 0
        credit_history_months:
          type: integer
          minimum: 0
        existing_defaults:
          type: integer
          minimum: 0
    ScorePrediction:
      type: object
      additionalProperties: false
      required:
        - application_id
        - requested_amount
        - risk_score
        - model_version
        - reason_codes
      properties:
        application_id:
          type: string
          minLength: 8
        requested_amount:
          type: number
          exclusiveMinimum: 0
        risk_score:
          type: number
          minimum: 0
          maximum: 1
        model_version:
          type: string
          minLength: 3
        reason_codes:
          type: array
          items:
            type: string
    DecisionResult:
      type: object
      additionalProperties: false
      required: [application_id, risk_score, decision, reason_codes]
      properties:
        application_id:
          type: string
          minLength: 8
        risk_score:
          type: number
          minimum: 0
          maximum: 1
        decision:
          type: string
          pattern: "^(approve|review|decline)$"
        reason_codes:
          type: array
          items:
            type: string
    GatewayCreditEvaluationResponse:
      type: object
      additionalProperties: false
      required: [features, score, decision]
      properties:
        features:
          $ref: '#/components/schemas/FeatureVector'
        score:
          $ref: '#/components/schemas/ScorePrediction'
        decision:
          $ref: '#/components/schemas/DecisionResult'
