name: ci

on:
  pull_request:
  push:
    branches: ["main", "v0"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.0.1
          python -m pip install --require-hashes -r requirements/lock/dev.lock
      - name: Lint
        run: make lint
      - name: Type check
        run: make type-check
      - name: Pyright check
        run: make pyright-check
      - name: Docs audience lint
        run: make docs-audience-lint
      - name: Unit and contract tests
        run: make unit-tests
      - name: Coverage gate
        run: make coverage-gate
      - name: Security scan
        run: make security-scan
      - name: Cybersecurity posture gate
        env:
          BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          ENFORCE_REMOTE_BRANCH_PROTECTION: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}
        run: make cybersec-posture
      - name: Contract lint
        run: make contract-lint
      - name: ADR governance gate
        run: make adr-gate

  container-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Container hardening gate
        run: python scripts/ci/container_hardening_gate.py

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.0.1
          python -m pip install --require-hashes -r requirements/lock/dev.lock
      - name: Generate SBOM
        run: |
          mkdir -p build
          cyclonedx-py requirements requirements/lock/base.lock -o build/sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: build/sbom.json
